<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TruthLens - Demo UI</title>
  <style>
    body { font-family: Inter, system-ui, Arial; margin: 40px; color:#111; }
    input, button, textarea { font-size: 14px; padding:8px; margin:6px 0; width:100%; box-sizing:border-box; }
    .card { max-width:900px; margin: 10px auto; }
    pre { background:#f5f5f7; padding:12px; border-radius:8px; overflow:auto; }
    .status { margin-top: 10px; font-size: 12px; color: #666; }
    .error { color: #d00; }
    .success { color: #060; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TruthLens — Quick Demo</h1>
    <p>Enter a question and press <strong>Ask</strong>. This calls <code>/query</code> on the backend.</p>

    <label>Question</label>
    <input id="q" value="Who discovered penicillin?" />

    <label>k (top docs)</label>
    <input id="k" type="number" value="3" min="1" />

    <button id="ask">Ask</button>
    <div id="status" class="status"></div>

    <h3>Response</h3>
    <pre id="out">No response yet.</pre>
  </div>

  <script>
    console.log("index.html loaded");
    
    document.getElementById('ask').addEventListener('click', async () => {
      const q = document.getElementById('q').value;
      const k = parseInt(document.getElementById('k').value || '3', 10);
      const statusEl = document.getElementById('status');
      const outEl = document.getElementById('out');
      
      outEl.textContent = 'Loading...';
      statusEl.textContent = '';
      
      try {
        const r = await fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, k: k })
        });
        
        if (!r.ok) {
          throw new Error(`HTTP ${r.status}`);
        }
        
        const j = await r.json();
        outEl.textContent = JSON.stringify(j, null, 2);
        statusEl.innerHTML = '<span class="success">✓ Request successful</span>';
        console.log("Query result:", j);
      } catch (err) {
        outEl.textContent = 'Error: ' + err.message + '\n\nMake sure backend is running on http://localhost:8000';
        statusEl.innerHTML = '<span class="error">✗ ' + err.message + '</span>';
        console.error("Fetch error:", err);
      }
    });
  </script>
</body>
</html>
