name: CI

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run lint (black check)
        run: |
          pip install black
          black --check .
      - name: Smoke test server start
        run: |
          nohup uvicorn truthlens.backend.app.main:app --host 0.0.0.0 --port 8000 &
          sleep 2
          curl -sSf http://127.0.0.1:8000/health || (cat nohup.out && exit 1)
